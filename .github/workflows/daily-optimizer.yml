name: рҹҸӯ жҜҸж—Ҙз¶Із«ҷе„ӘеҢ– Loop

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  optimize-loop:
    name: рҹ”§ е„ӘеҢ– Loop
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: рҹҗҚ Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: рҹ“Ҙ Install deps
        run: pip install pyyaml requests

      - name: рҹ“Ҡ Step 1 вҖ” й–Ӣ Issues
        id: parse
        run: |
          python scripts/optimize-loop.py 2>&1 | tee /tmp/opt_step1.log
          python3 -c 'import json; d=json.load(open("/tmp/optimizer_issues.json")); print(len(d.get("issues",[])))' > /tmp/issue_count.txt 2>/dev/null || echo 0 > /tmp/issue_count.txt
          echo "issues=$(cat /tmp/issue_count.txt)" >> $GITHUB_OUTPUT

      - name: рҹ”§ Step 2 вҖ” WorkerвҶ’PickyвҶ’Advisor
        if: steps.parse.outputs.issues != '0'
        run: python scripts/worker_picky_advisor_loop.py 2>&1 | tee /tmp/opt_step2.log

      - name: рҹҡҖ Step 3 вҖ” дёҠз·ҡ
        if: success()
        run: python scripts/deploy.py 2>&1 | tee /tmp/opt_step3.log || echo "No deploy needed"

      - name: рҹ“Ӣ еҪҷзёҪе ұе‘Ҡ
        if: always()
        run: python scripts/actions_report.py 2>&1