name: рҹҸӯ жҜҸж—Ҙз¶Із«ҷе„ӘеҢ– Loop

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  optimize-loop:
    name: рҹ”§ е„ӘеҢ– Loop
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: рҹҗҚ Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: рҹ“Ҙ Install deps
        run: pip install pyyaml requests

      - name: рҹ“Ҡ Step 1 вҖ” й–Ӣ Issues
        id: parse
        run: |
          python scripts/optimize-loop.py 2>&1 | tee /tmp/opt_step1.log
          COUNT=$(python3 -c "import json; d=json.load(open('/tmp/optimizer_issues.json')); print(len(d.get('issues',[])))" 2>/dev/null || echo 0)
          echo "issues=$COUNT" >> $GITHUB_OUTPUT

      - name: рҹ”§ Step 2 вҖ” WorkerвҶ’PickyвҶ’Advisor
        if: steps.parse.outputs.issues != '0'
        run: python scripts/worker_picky_advisor_loop.py 2>&1 | tee /tmp/opt_step2.log

      - name: рҹҡҖ Step 3 вҖ” дёҠз·ҡ
        if: success()
        run: python scripts/deploy.py 2>&1 | tee /tmp/opt_step3.log || echo "вҡ пёҸ No deploy needed"

      - name: рҹ“Ӣ еҪҷзёҪе ұе‘Ҡ
        if: always()
        run: |
          echo "## рҹҸӯ жҜҸж—Ҙе„ӘеҢ– Loop зөҗжһң" > /tmp/report.md
          echo "" >> /tmp/report.md
          echo '### Step 1: и§Јжһҗе ұе‘Ҡ' >> /tmp/report.md
          echo '```' >> /tmp/report.md
          cat /tmp/opt_step1.log 2>/dev/null || echo "(none)" >> /tmp/report.md
          echo '```' >> /tmp/report.md
          echo "" >> /tmp/report.md
          echo '### Step 2: WorkerвҶ’PickyвҶ’Advisor' >> /tmp/report.md
          echo '```' >> /tmp/report.md
          cat /tmp/opt_step2.log 2>/dev/null || echo "(none)" >> /tmp/report.md
          echo '```' >> /tmp/report.md
          echo "" >> /tmp/report.md
          echo '### йҖҡйҒҺзӢҖж…Ӣ' >> /tmp/report.md
          python3 -c "
import json
d = json.load(open('/tmp/optimizer_daily_result.json'))
for r in d.get('results', []):
    s = 'вң…' if r.get('passed') else 'вҡ пёҸ'
    print(f'- {s} #{r[\"issue\"]} | {r.get(\"best_worker\",\"?\")} | {r.get(\"best_score\",0)}/100')
print(f'зёҪиЁҲ: {d.get(\"passed\",0)}/{d.get(\"total_issues\",0)} йҖҡйҒҺ')
" 2>/dev/null >> /tmp/report.md || echo "(no results)" >> /tmp/report.md
          cat /tmp/report.md